apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: longhorn-monitoring
spec:
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring-system
          podSelector:
            matchLabels:
              app.kubernetes.io/component: vmagent
              app.kubernetes.io/instance: victoriametrics
      ports:
        - port: manager
  podSelector:
    matchLabels:
      app: longhorn-manager
  policyTypes:
    - Ingress
