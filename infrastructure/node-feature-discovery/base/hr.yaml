apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: node-feature-discovery
  namespace: flux-system
spec:
  chart:
    spec:
      version: 0.18.0
      chart: node-feature-discovery
      interval: 1h
      sourceRef:
        name: kubernetes-sigs-nfd
        kind: HelmRepository
        namespace: flux-system
  interval: 10m
  releaseName: node-feature-discovery
  targetNamespace: node-feature-discovery
  values:
    worker:
      config:
        core:
          labelSources:
            - system
            - kernel
            - network
        featureSources:
          - system
          - kernel
          - network
          - cpu
          - local
          - pci
        custom:
          - name: network.1g
            labels:
              network.speed.1g: "true"
            matchFeatures:
              - feature: kernel.loadedmodule
                matchExpressions:
                  igb:
                    op: Exists
                  e1000e:
                    op: Exists
                  r8169:
                    op: Exists
                  virtio_net:
                    op: Exists
                  tg3:
                    op: Exists
          - name: network.2.5g
            labels:
              network.speed.2.5g: "true"
            matchFeatures:
              - feature: kernel.loadedmodule
                matchExpressions:
                  igc:
                    op: Exists
                  r8125:
                    op: Exists
          - name: network.10g
            labels:
              network.speed.10g: "true"
            matchFeatures:
              - feature: kernel.loadedmodule
                matchExpressions:
                  bnx2x:
                    op: Exists
                  be2net:
                    op: Exists
                  qlcnic:
                    op: Exists
                  i40e:
                    op: Exists
                  ice:
                    op: Exists
                  mlx5_core:
                    op: Exists
          - name: network.25g
            labels:
              network.speed.25g: "true"
            matchFeatures:
              - feature: kernel.loadedmodule
                matchExpressions:
                  i40e:
                    op: Exists
                  ice:
                    op: Exists
                  mlx5_core:
                    op: Exists
          - name: network.40g
            labels:
              network.speed.40g: "true"
            matchFeatures:
              - feature: kernel.loadedmodule
                matchExpressions:
                  mlx4_core:
                    op: Exists
          - name: network.100g
            labels:
              network.speed.100g: "true"
            matchFeatures:
              - feature: kernel.loadedmodule
                matchExpressions:
                  ionic:
                    op: Exists
                  qed:
                    op: Exists
    master:
      replicaCount: 1
