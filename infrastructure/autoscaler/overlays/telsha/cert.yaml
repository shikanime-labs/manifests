apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: vpa-tls-secret
  namespace: autoscaler-system
spec:
  commonName: vpa-webhook
  dnsNames:
    - vpa-webhook
  duration: 8760h
  issuerRef:
    name: telsha
    kind: ClusterIssuer
  renewBefore: 720h
  secretName: vpa-tls-secret
  usages:
    - digital signature
    - key encipherment
    - server auth
