apiVersion: nfd.k8s-sigs.io/v1alpha1
kind: NodeFeatureRule
metadata:
  name: intel-quicksync-video
  namespace: node-feature-discovery-system
spec:
  rules:
    - name: qsv.capable
      labels:
        qsv.enabled: "true"
      matchFeatures:
        - feature: pci.device
          matchExpressions:
            class:
              op: In
              value:
                - "0300"
    - name: qsv.device
      labels:
        qsv.device: '{{ index .Elements 0 "attributes" "device" }}'
      matchFeatures:
        - feature: pci.device
          matchExpressions:
            class:
              op: In
              value:
                - "0300"
