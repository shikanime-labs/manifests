apiVersion: nfd.k8s-sigs.io/v1alpha1
kind: NodeFeatureRule
metadata:
  name: intel-quicksync-video
  namespace: node-feature-discovery-system
spec:
  rules:
    - name: qsv.capable
      labels:
        qsv.enabled: "true"
      matchFeatures:
        - feature: cpu.vendor_id
          matchExpressions:
            value:
              op: In
              value:
                - GenuineIntel
        - feature: pci.class
          matchExpressions:
            value:
              op: In
              value:
                - "0300"
    - name: qsv.device
      labels:
        qsv.device: "{{ .domain }}.{{ .feature }}"
      matchFeatures:
        - feature: cpu.vendor_id
          matchExpressions:
            value:
              op: In
              value:
                - GenuineIntel
        - feature: pci.class
          matchExpressions:
            value:
              op: In
              value:
                - "0300"
