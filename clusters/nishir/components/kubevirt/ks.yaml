---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-kubevirt
  namespace: flux-system
spec:
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  deletionPolicy: Orphan
  healthChecks:
    - apiVersion: apps/v1
      kind: Deployment
      name: virt-operator
      namespace: kubevirt
  interval: 10m
  path: ./infrastructure/kubevirt/overlays/nishir
  prune: true
  sourceRef:
    name: flux-system
    kind: GitRepository
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: config-kubevirt
  namespace: flux-system
spec:
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  deletionPolicy: Orphan
  dependsOn:
    - name: infrastructure-kubevirt
  healthChecks:
    - apiVersion: kubevirt.io/v1
      kind: KubeVirt
      name: kubevirt
      namespace: kubevirt
  interval: 10m
  path: ./configs/kubevirt/overlays/nishir
  prune: true
  sourceRef:
    name: flux-system
    kind: GitRepository
