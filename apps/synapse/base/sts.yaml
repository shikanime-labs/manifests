apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: synapse
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: synapse
      app.kubernetes.io/name: synapse
  serviceName: synapse
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: synapse
        app.kubernetes.io/name: synapse
    spec:
      containers:
        - name: synapse
          image: synapse
          volumeMounts:
            - name: data
              mountPath: /data
          securityContext:
            capabilities:
              add:
                - SETUID
                - SETGID
      initContainers:
        - name: config-sync
          image: rclone
          args:
            - copy
            - --copy-links
            - /mnt/startup-config
            - /mnt/data
          volumeMounts:
            - name: data
              mountPath: /mnt/data
            - name: rclone-config
              mountPath: /config/rclone/rclone.conf
              readOnly: true
              subPath: rclone.conf
            - name: startup-config
              mountPath: /mnt/startup-config
              readOnly: true
          securityContext:
            capabilities:
              add:
                - FOWNER
      securityContext:
        fsGroup: 991
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: synapse-data
        - name: rclone-config
          configMap:
            name: synapse-rclone
        - name: startup-config
          projected:
            sources:
              - secret:
                  name: synapse
              - secret:
                  name: mautrix-discord
                  items:
                    - key: registration.yaml
                      path: appservices/matrix-discord.yaml
                    - key: doublepuppet.yaml
                      path: appservices/matrix-discord-doublepuppet.yaml
              - secret:
                  name: mautrix-googlechat
                  items:
                    - key: registration.yaml
                      path: appservices/matrix-googlechat.yaml
                    - key: doublepuppet.yaml
                      path: appservices/matrix-googlechat-doublepuppet.yaml
              - secret:
                  name: mautrix-linkedin
                  items:
                    - key: registration.yaml
                      path: appservices/matrix-linkedin.yaml
                    - key: doublepuppet.yaml
                      path: appservices/matrix-linkedin-doublepuppet.yaml
              - secret:
                  name: mautrix-meta
                  items:
                    - key: registration.yaml
                      path: appservices/matrix-meta.yaml
                    - key: doublepuppet.yaml
                      path: appservices/matrix-meta-doublepuppet.yaml
              - secret:
                  name: mautrix-signal
                  items:
                    - key: registration.yaml
                      path: appservices/matrix-signal.yaml
                    - key: doublepuppet.yaml
                      path: appservices/matrix-signal-doublepuppet.yaml
              - secret:
                  name: mautrix-slack
                  items:
                    - key: registration.yaml
                      path: appservices/matrix-slack.yaml
                    - key: doublepuppet.yaml
                      path: appservices/matrix-slack-doublepuppet.yaml
              - secret:
                  name: mautrix-twitter
                  items:
                    - key: registration.yaml
                      path: appservices/matrix-twitter.yaml
                    - key: doublepuppet.yaml
                      path: appservices/matrix-twitter-doublepuppet.yaml
              - secret:
                  name: mautrix-whatsapp
                  items:
                    - key: registration.yaml
                      path: appservices/matrix-whatsapp.yaml
                    - key: doublepuppet.yaml
                      path: appservices/matrix-whatsapp-doublepuppet.yaml
