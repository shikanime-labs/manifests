apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: honcho
spec:
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: hermes-agent
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring-system
          podSelector:
            matchLabels:
              app.kubernetes.io/name: vmagent
      ports:
        - port: http
  podSelector:
    matchLabels:
      app.kubernetes.io/instance: honcho
      app.kubernetes.io/name: honcho
  policyTypes:
    - Ingress
