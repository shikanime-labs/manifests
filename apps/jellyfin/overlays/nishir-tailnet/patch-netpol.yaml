- op: add
  path: /spec/ingress/-
  value:
    from:
      - namespaceSelector:
          matchLabels:
            kubernetes.io/metadata.name: tailscale-system
    ports:
      - port: https
- op: add
  path: /spec/ingress/-
  value:
    from:
      - namespaceSelector:
          matchLabels:
            kubernetes.io/metadata.name: monitoring-system
        podSelector:
          matchLabels:
            app.kubernetes.io/name: vmagent
    ports:
      - port: metrics
