    well_known_response: null
  displayname_template:
    "{{if .Webhook}}Webhook{{else}}{{or .GlobalName .Username}}{{if .Bot}}
    (bot){{end}}{{end}}"
  double_puppet_allow_discovery: false
  double_puppet_server_map:
    matrix.taila659a.ts.net: https://matrix.taila659a.ts.net
  embed_fields_as_tables: true
  enable_webhook_avatars: false
  encryption:
    allow: true
    allow_key_sharing: false
    appservice: false
    default: true
    delete_keys:
      delete_fully_used_on_decrypt: true
      delete_on_device_delete: true
      delete_outbound_on_ack: false
      delete_outdated_inbound: true
      delete_prev_on_new_session: true
      dont_store_outbound: true
      periodically_delete_expired: true
      ratchet_on_decrypt: true
    msc4190: false
    plaintext_mentions: false
    require: false
    rotation:
      disable_device_change_key_rotation: false
      enable_custom: false
      messages: 100
      milliseconds: 6.048e+08
    self_sign: true
    verification_levels:
      receive: cross-signed-tofu
      send: cross-signed-tofu
      share: cross-signed-tofu
  federate_rooms: true
  guild_name_template: "{{.Name}}"
  login_shared_secret_map:
    matrix.taila659a.ts.net: ENC[AES256_GCM,data:MwFr27PU5O/HBbJskwo5yiILkVbfJW188pNQcvwk3tFQjz52Mt8Jp1saEOB6wmjaGV+EG/6EiG0I+VyxtOHlMA==,iv:6QlWSewsEd/pReVeu7SWUAODaRbVefo9hTw/0shtpH8=,tag:nYR5+oEbb2PpxmZcsYlxhw==,type:str]
