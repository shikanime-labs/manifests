bridge:
  animated_sticker:
    args:
      fps: 25
      height: 320
      width: 320
    target: webp
  autojoin_thread_on_open: true
  avatar_proxy_key: ENC[AES256_GCM,data:tRuoXHo9rBczAsJdPLRnLNqHDUVkE3tP8MyK1h/5mVw=,iv:/Rw8w3l93M6qa6cIKlQ6wc1atseaAdX8G4eXbmfjcvo=,tag:y51OoCSsIoMOKVdvOhhmrA==,type:str]
