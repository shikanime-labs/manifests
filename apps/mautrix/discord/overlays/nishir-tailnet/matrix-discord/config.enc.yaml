    welcome_unconnected: Use `help` for help or `login` to log in.
  message_error_notices: true
  message_status_events: false
  mute_channels_on_create: false
  permissions:
    "*": relay
    "@root:matrix.taila659a.ts.net": admin
    matrix.taila659a.ts.net: user
  portal_message_buffer: 128
  prefix_webhook_messages: true
  private_chat_portal_meta: default
  provisioning:
    debug_endpoints: false
    prefix: /_matrix/provision
    shared_secret: ENC[AES256_GCM,data:vdpi8NZczcQqIjJd8N6Whqg7O8QUpXrQqYAB13B4ZGnrSZcoAnEke5poP8guyq/VBGHC9UMOB5SM3wxbOxQeow==,iv:4ig5mJQH2vNz7UeUeVUGLL5IoYTtoChP4ulixRJWYSQ=,tag:JT4FzwT8wrKm3ER51EQXhg==,type:str]
  proxy: null
  public_address: https://matrix-discord.taila659a.ts.net
  resend_bridge_info: false
  restricted_rooms: true
  startup_private_channel_create_limit: 5
  sync_direct_chat_list: false
  use_discord_cdn_upload: true
  username_template: discord_{{.}}
homeserver:
  address: https://synapse:8448
  async_media: false
  domain: matrix.taila659a.ts.net
  message_send_checkpoint_endpoint: null
  ping_interval_seconds: 0
  software: standard
  status_endpoint: null
  websocket: false
logging:
  min_level: debug
  writers:
    - type: stdout
      format: pretty-colored
    - type: file
      compress: true
      filename: ./logs/mautrix-discord.log
      format: json
      max_backups: 10
      max_size: 100
