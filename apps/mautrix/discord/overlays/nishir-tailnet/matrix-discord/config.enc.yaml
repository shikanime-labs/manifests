    forward_limits:
      initial:
        channel: 50
        dm: 50
        thread: 50
      missed:
        channel: 500
        dm: 500
        thread: 500
    max_guild_members: -1
  cache_media: unencrypted
  channel_name_template:
    "{{if or (eq .Type 3) (eq .Type 4)}}{{.Name}}{{else}}#{{.Name}}{{end}}"
  command_prefix: "!discord"
  custom_emoji_reactions: true
  delete_guild_on_leave: true
  delete_portal_on_channel_delete: false
  delivery_receipts: false
  direct_media:
    allow_proxy: true
    enabled: false
    server_key: ENC[AES256_GCM,data:/e1yoljkzCs+U1gbSZGpnw49jqav3p6pWMOKpg+NXlqIQFCwfCVhsa6TFlxis1U8wy5qe5iNor7VZw==,iv:mTrYlZYei/hkC/CxLdHWVQsuJBRTYyGhavUI/mwGzzg=,tag:cj3Z01sG0PCEUM9eOOTZjQ==,type:str]
