resources:
  - ../nishir
  - ingress.yaml
namespace: shikanime
configMapGenerator:
  - name: copyparty
    files:
      - ./copyparty/config.conf
labels:
  - includeTemplates: true
    pairs:
      app.kubernetes.io/component: file-server
      app.kubernetes.io/instance: copyparty
      app.kubernetes.io/name: copyparty
      app.kubernetes.io/part-of: nishir-operation
      app.kubernetes.io/version: 1.20.16
patches:
  - path: patch-netpol.yaml
    target:
      name: copyparty
      version: v1
      kind: NetworkPolicy
  - path: patch-svc.yaml
