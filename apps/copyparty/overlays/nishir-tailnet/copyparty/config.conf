[global]
  # System settings
  ansi
  hist: /cfg/hists/
  name: copyparty
  no-fpool
  no-robots
  shr: /share
  dedup

  # 4MB buffer for file transfers
  iobuf: 4194304

  # Auto-detect number of CPU cores for jobs
  j: 0

  # Auth
  ah-alg: argon2
  dav-auth
  idp-h-usr: Tailscale-User-Login

  # Reverse Proxy
  rproxy: 0
  xff-hdr: x-forwarded-for
  xff-src: 127.0.0.1, 169.254.0.0/16, 10.244.0.0/16

  # Network access (rproxy:0 → only the proxy pod TCP IP is checked)
  # ipar tied to k8s pod CIDR; bump if the cluster subnet changes
  ipar: 127.0.0.1, 10.244.0.0/16, 192.168.1.0/16

  # FTP/SFTP settings
  ftp: 3921
  ftps: 3990
  ftp-nat: 100.68.52.27
  ftp-pr: 12000-12099
  sftp: 3922
  sftp-pw
  sftp-key: shikanime.deva@gmail.com ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIH+tp1Xfz7NomHCZuDPlfj3XW5hm9t0TiCyEeudRraoe

