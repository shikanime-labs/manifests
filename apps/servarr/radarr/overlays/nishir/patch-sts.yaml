apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: radarr
spec:
  template:
    spec:
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - preference:
                matchExpressions:
                  - key: network.speed.2.5g
                    operator: In
                    values:
                      - "true"
              weight: 50
      containers:
        - name: radarr
          volumeMounts:
            - name: movies-data
              mountPath: /data/movies
            - name: downloads-data
              mountPath: /downloads
      volumes:
        - name: movies-data
          persistentVolumeClaim:
            claimName: movies-data
        - name: downloads-data
          persistentVolumeClaim:
            claimName: downloads-data
